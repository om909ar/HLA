<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>روتيني الشهري</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(135deg, #fff5f7 0%, #f0e6ff 100%);
  margin: 0;
  padding: 20px;
}

h2 {
  text-align: center;
  color: #ff8fab;
}

/* السحب الأفقي */
.container {
  display: flex;
  overflow-x: auto;
  gap: 15px;
  padding: 20px 0;
}

/* الكرت */
.card {
  min-width: 220px;
  background: white;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  flex-shrink: 0;
}

/* اليوم والتاريخ */
.day {
  font-weight: bold;
  color: #ff8fab;
}

.date {
  font-size: 14px;
  color: gray;
}

/* الروتين */
textarea {
  width: 100%;
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #eee;
  padding: 10px;
  resize: none;
}

/* يوم منتهي */
.done {
  opacity: 0.4;
  text-decoration: line-through;
}
</style>

</head>

<body>

<h2>📅 روتيني الشهري</h2>

<div class="container" id="container"></div>

<script>

let today = new Date();
let currentDay = today.getDate();
let year = today.getFullYear();
let month = today.getMonth();

let daysNames = ["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];

// مفتاح خاص لكل شهر
let storageKey = `routine-${year}-${month}`;
let data = JSON.parse(localStorage.getItem(storageKey)) || {};

// عدد أيام الشهر
let daysInMonth = new Date(year, month + 1, 0).getDate();

let container = document.getElementById("container");

// إنشاء الكروت
for (let i = 1; i <= daysInMonth; i++) {

  let dateObj = new Date(year, month, i);
  let dayName = daysNames[dateObj.getDay()];

  let card = document.createElement("div");
  card.className = "card";

  // إذا اليوم انتهى
  if (i < currentDay) {
    card.classList.add("done");
  }

  card.innerHTML = `
    <div class="day">${dayName}</div>
    <div class="date">${i}/${month+1}/${year}</div>
    <textarea placeholder="اكتب روتينك..." oninput="save(${i}, this.value)">${data[i] || ""}</textarea>
  `;

  container.appendChild(card);
}

// حفظ
function save(day, value) {
  data[day] = value;
  localStorage.setItem(storageKey, JSON.stringify(data));
}

</script>

</body>
</html>
