<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>روتيني الشهري</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(135deg, #fff5f7 0%, #f0e6ff 100%);
  margin: 0;
  padding: 20px;
}

h2 {
  text-align: center;
  color: #ff8fab;
}

/* السحب الأفقي */
.container {
  display: flex;
  flex-direction: column; /* أهم شي */
  gap: 15px;
  padding: 20px 0;
}

/* الكرت */
.card {
  min-width: 220px;
  background: white;
  border-radius: 15px;
  padding: 15px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
  flex-shrink: 0;
}

/* اليوم والتاريخ */
.day {
  font-weight: bold;
  color: #ff8fab;
}

.date {
  font-size: 14px;
  color: gray;
}

/* الروتين */
textarea {
  width: 100%;
  box-sizing: border-box; /* 🔥 هذا أهم سطر */
  margin-top: 10px;
  border-radius: 10px;
  border: 1px solid #eee;
  padding: 12px;
  resize: none;

  font-size: 16px;
  font-weight: bold;
  color: #d81b60;
}
  
/* يوم منتهي */
.done {
  opacity: 0.4;
  text-decoration: line-through;
}

  .back-btn {
  display: block;
  text-align: right;
  margin-bottom: 10px;
  text-decoration: none;
  color: #ff8fab;
  font-weight: bold;
  font-size: 16px;
}

  .today {
  border: 2px solid #d81b60;
  background: #fff0f5;
}


</style>

  <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wl3gmwxbmg");
</script>

</head>

<body>

  <a href="index.html" class="back-btn">← العودة للرئيسية</a>
  
<h2>روتيني الشهري💅🏻</h2>

<div class="container" id="container"></div>

<script>

let today = new Date();
let currentDay = today.getDate();
let year = today.getFullYear();
let month = today.getMonth();

let daysNames = ["الأحد","الإثنين","الثلاثاء","الأربعاء","الخميس","الجمعة","السبت"];

// مفتاح خاص لكل شهر
let storageKey = `routine-${year}-${month}`;
let data = JSON.parse(localStorage.getItem(storageKey)) || {};

// عدد أيام الشهر
let daysInMonth = new Date(year, month + 1, 0).getDate();

let container = document.getElementById("container");

// إنشاء الكروت
for (let i = 1; i <= daysInMonth; i++) {

  let dateObj = new Date(year, month, i);
  let dayName = daysNames[dateObj.getDay()];

  let card = document.createElement("div");
  card.className = "card";
  card.id = "day-" + i;

  // اليوم الحالي
  if (i === currentDay) {
    card.classList.add("today");
  }

  // الأيام القديمة
  let isDone = i < currentDay;

  if (isDone) {
    card.classList.add("done");
  }

  card.innerHTML = `
    <div class="day">${dayName}</div>
    <div class="date">${i}/${month+1}/${year}</div>
    <textarea 
      placeholder="اكتب روتينك..." 
      ${isDone ? "disabled" : ""} 
      oninput="save(${i}, this.value)"
    >${data[i] || ""}</textarea>
  `;

  container.appendChild(card);

} // ✅ هنا تقفل اللوب فقط
// حفظ
function save(day, value) {
  data[day] = value;
  localStorage.setItem(storageKey, JSON.stringify(data));
}


setTimeout(() => {
  let todayCard = document.getElementById("day-" + currentDay);

  if (todayCard) {
    todayCard.scrollIntoView({
      behavior: "smooth",
      block: "center"
    });
  }
}, 300);
  
  
</script>

</body>
</html>
