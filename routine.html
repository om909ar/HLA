
<!DOCTYPE html>
<html lang="ar">
<head>
<meta charset="UTF-8">
<title>روتيني الشهري</title>

<style>
body {
  font-family: Arial;
  direction: rtl;
  text-align: center;
  background: linear-gradient(to right, #e5a82f, #f2c14e);
  margin: 0;
}

/* زر الرجوع */
.back-btn {
  display: block;
  text-align: right;
  padding: 15px;
  text-decoration: none;
  color: black;
  font-weight: bold;
}

/* التحكم */
.controls {
  margin: 20px;
}

input, select {
  padding: 10px;
  margin: 5px;
  width: 200px;
  border-radius: 8px;
  border: none;
}

button {
  padding: 10px 20px;
  cursor: pointer;
  border: none;
  border-radius: 8px;
  background: #1e6fa8;
  color: white;
}

/* الجدول */
.calendar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  padding: 20px;
}

.day {
  background: white;
  border-radius: 12px;
  padding: 10px;
  min-height: 100px;
}

.day h3 {
  margin: 5px;
}

.routine {
  font-size: 13px;
  margin-top: 5px;
}
</style>

</head>

<body>

<a href="index.html" class="back-btn">← العودة للرئيسية</a>

<h2>📅 روتيني الشهري</h2>

<div class="controls">

  <select id="daySelect">
    <option>السبت</option>
    <option>الأحد</option>
    <option>الإثنين</option>
    <option>الثلاثاء</option>
    <option>الأربعاء</option>
    <option>الخميس</option>
    <option>الجمعة</option>
  </select>

  <br>

  <input type="text" id="routineInput" placeholder="اكتب روتينك">

  <br>

  <input type="number" id="dayNumber" placeholder="رقم اليوم (1-30)" min="1" max="30">

  <br>

  <button onclick="addRoutine()">إضافة</button>

</div>

<div class="calendar" id="calendar"></div>

<script>

// تحميل البيانات المحفوظة
let routines = JSON.parse(localStorage.getItem("routines")) || {};

// إنشاء الأيام
let calendar = document.getElementById("calendar");

for (let i = 1; i <= 30; i++) {
  let div = document.createElement("div");
  div.className = "day";
  div.id = "day-" + i;

  div.innerHTML = `
    <h3>يوم ${i}</h3>
    <div class="routine" id="routine-${i}"></div>
  `;

  calendar.appendChild(div);
}

// عرض البيانات المحفوظة
function renderRoutines() {
  for (let day in routines) {
    let box = document.getElementById("routine-" + day);
    box.innerHTML = "";

    routines[day].forEach((item, index) => {
      box.innerHTML += `
        <div>
          (${item.day}) - ${item.text}
          <button onclick="deleteRoutine(${day}, ${index})">❌</button>
          <button onclick="editRoutine(${day}, ${index})">✏️</button>
        </div>
      `;
    });
  }
}

// إضافة الروتين
function addRoutine() {
  let dayNum = document.getElementById("dayNumber").value;
  let routineText = document.getElementById("routineInput").value;
  let selectedDay = document.getElementById("daySelect").value;

  if (!dayNum || !routineText) {
    alert("عبي كل الحقول");
    return;
  }

  if (!routines[dayNum]) {
    routines[dayNum] = [];
  }

  routines[dayNum].push({
    day: selectedDay,
    text: routineText
  });

  saveData();
  renderRoutines();

  document.getElementById("routineInput").value = "";
}

// حذف
function deleteRoutine(day, index) {
  routines[day].splice(index, 1);
  saveData();
  renderRoutines();
}

// تعديل
function editRoutine(day, index) {
  let newText = prompt("عدل الروتين:", routines[day][index].text);

  if (newText) {
    routines[day][index].text = newText;
    saveData();
    renderRoutines();
  }
}

// حفظ
function saveData() {
  localStorage.setItem("routines", JSON.stringify(routines));
}

// أول تحميل
renderRoutines();

</script>

</body>
</html>
