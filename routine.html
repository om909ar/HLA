<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>روتيني الشهري</title>

<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(135deg, #fff5f7 0%, #f0e6ff 100%);
  text-align: center;
  margin: 0;
  padding: 20px;
}

/* زر الرجوع */
.back {
  display: block;
  text-align: right;
  margin-bottom: 10px;
  text-decoration: none;
  color: #ff8fab;
  font-weight: bold;
}

/* العنوان */
h2 {
  color: #ff8fab;
}

/* التحكم */
input, select {
  padding: 10px;
  margin: 5px;
  border-radius: 10px;
  border: 1px solid #ffd6e0;
}

button {
  background: #ff8fab;
  color: white;
  border: none;
  padding: 10px 20px;
  border-radius: 10px;
  cursor: pointer;
}

/* الجدول */
.calendar {
  display: grid;
  grid-template-columns: repeat(5, 1fr);
  gap: 10px;
  margin-top: 20px;
}

.day {
  background: white;
  border-radius: 15px;
  padding: 10px;
  min-height: 90px;
}
</style>

</head>

<body>

<a href="index.html" class="back">← العودة للرئيسية</a>

<h2>📅 روتيني الشهري</h2>

<select id="daySelect">
  <option>السبت</option>
  <option>الأحد</option>
  <option>الإثنين</option>
  <option>الثلاثاء</option>
  <option>الأربعاء</option>
  <option>الخميس</option>
  <option>الجمعة</option>
</select>

<br>

<input type="text" id="routineInput" placeholder="اكتب روتينك">

<br>

<input type="number" id="dayNumber" placeholder="رقم اليوم (1-30)" min="1" max="30">

<br>

<button onclick="addRoutine()">إضافة</button>

<div class="calendar" id="calendar"></div>

<script>
let routines = JSON.parse(localStorage.getItem("routines")) || {};
let calendar = document.getElementById("calendar");

// إنشاء الأيام
for (let i = 1; i <= 30; i++) {
  let div = document.createElement("div");
  div.className = "day";
  div.id = "day-" + i;
  div.innerHTML = `<b>يوم ${i}</b><div id="r-${i}"></div>`;
  calendar.appendChild(div);
}

// عرض البيانات
function render() {
  for (let d in routines) {
    let box = document.getElementById("r-" + d);
    box.innerHTML = "";
    routines[d].forEach((r, i) => {
      box.innerHTML += `
        <div>
          ${r.day} - ${r.text}
          <span onclick="del(${d},${i})">❌</span>
        </div>
      `;
    });
  }
}

// إضافة
function addRoutine() {
  let d = dayNumber.value;
  let t = routineInput.value;
  let day = daySelect.value;

  if (!d || !t) return;

  if (!routines[d]) routines[d] = [];

  routines[d].push({ day, text: t });

  localStorage.setItem("routines", JSON.stringify(routines));
  render();
  routineInput.value = "";
}

// حذف
function del(d,i){
  routines[d].splice(i,1);
  localStorage.setItem("routines", JSON.stringify(routines));
  render();
}

render();
</script>

</body>
</html>
