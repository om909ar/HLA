
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>معلوماتي</title>

<style>
body {
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(135deg, #fff5f7, #f0e6ff);
  padding: 0; /* 👈 بدل 20 */
  margin: 0;  /* 👈 أضفها */
}

/* الكرت */
.box {
  background: white;
  padding: 20px;
  border-radius: 20px;

  width: 88%;
max-width: 380px;

  margin: 30px auto;

  border: 2px solid #ffe4e9;
  box-shadow: 0 10px 25px rgba(255, 182, 193, 0.3);
}

  
/* العنوان */
h2 {
  text-align: center;
  color: #ff4d7d;
  font-size: 24px;
  margin-bottom: 20px;
}
  

/* النص */
textarea {
  width: 100%;
  height: auto;

  border-radius: 15px;
  padding: 15px;

  border: 1px solid #ffd6e0;
  background: #fff0f5;

  font-size: 16px;
  line-height: 1.8;

  font-weight: bold;
  color: #d81b60; /* 👈 اللون الوردي الأساسي */

  box-sizing: border-box;
  resize: none;
  overflow: hidden;
}
  
/* الزر */
button {
  display: block;
  width: 100%;

  margin-top: 20px;
  padding: 15px;

  border: none;
  background: #ff8fab;
  color: white;

  border-radius: 15px;
  font-size: 18px;
  font-weight: bold;

  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff4d7d;
}
</style>

</head>

<body>

<h2>📦 معلومات الشحن</h2>

<div class="box">

<textarea id="myInfo" readonly>
الاسم: هلا العتيبي
الجوال: 0508523488
المدينة: حائل
المحافظة: بقعاء
الحي: الظهيرة
العنوان الوطني: HLAA6741

رابط الحساب:
https://www.tiktok.com/@i.h2la?_r=1&_t=ZS-95j3jmEDp04
</textarea>

<button onclick="copyText()">📋 نسخ المعلومات</button>

</div>

<script>
function copyText() {
  let text = document.getElementById("myInfo");
  text.select();
  document.execCommand("copy");
  alert("تم النسخ ✅");
}
</script>

  <script>
window.onload = function() {
  let text = document.getElementById("myInfo");

  text.style.height = "auto";
  text.style.height = text.scrollHeight + "px";
};
</script>

</body>
</html>
