
<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>معلوماتي</title>

<style>
body {
  font-family: 'Tajawal', sans-serif;
  background: linear-gradient(135deg, #fff5f7, #f0e6ff);
  padding: 20px;
}

/* الكرت */
.box {
  max-width: 500px; /* 👈 صغرناه من 900 */
  width: 90%;
  margin: 40px auto;
}

  
/* العنوان */
h2 {
  text-align: center;
  color: #d81b60;
  font-size: 28px; /* 👈 كان 24 */
  margin-bottom: 25px;
}

/* النص */
textarea {
  width: 100%;
  height: auto; /* 👈 أهم سطر */
  min-height: 300px; /* 👈 يعطيه طول */

  border-radius: 15px;
  padding: 15px;

  border: 1px solid #ffe4e9;
  background: #fff0f5;

  font-size: 16px;
  line-height: 1.8;

  box-sizing: border-box;
  resize: none;
  overflow: hidden; /* 👈 يشيل السكرول */
}

  
/* الزر */
button {
  display: block;
  width: 100%;

  margin-top: 20px;
  padding: 15px;

  border: none;
  background: #ff8fab;
  color: white;

  border-radius: 15px;
  font-size: 18px;
  font-weight: bold;

  cursor: pointer;
  transition: 0.3s;
}

button:hover {
  background: #ff4d7d;
}
</style>

</head>

<body>

<h2>📦 معلومات الشحن</h2>

<div class="box">

<textarea id="myInfo" readonly>
الاسم: هلا العتيبي
الجوال: 0508523488
المدينة: حائل
المحافظة: بقعاء
الحي: الظهيرة
العنوان الوطني: HLAA6741

رابط الحساب:
https://www.tiktok.com/@i.h2la?_r=1&_t=ZS-95j3jmEDp04
</textarea>

<button onclick="copyText()">📋 نسخ المعلومات</button>

</div>

<script>
function copyText() {
  let text = document.getElementById("myInfo");
  text.select();
  document.execCommand("copy");
  alert("تم النسخ ✅");
}
</script>

</body>
</html>
