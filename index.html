<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إنجاز المهام الذكية ✨</title>
    
    <!-- إعدادات الأيقونة والظهور في الآيفون (Add to Home Screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="برانداتي">
    
    <!-- تصميم الأيقونة: وردة 🌸 بخلفية وردية ناعمة -->
    <link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><rect width=%22100%22 height=%22100%22 fill=%22%23fff5f7%22/><text y=%22.9em%22 x=%225%22 font-size=%2280%22>🌸</text></svg>">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
    
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #f0e6ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }
        
        .main-container {
            width: 100%;
            max-width: 900px;
            animation: fadeIn 1s ease-out;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.8);
            overflow: hidden;
            margin-bottom: 20px;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        /* تنسيق نموذج الإضافة */
        .add-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .input-field {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border-radius: 15px;
            border: 2px solid #ffe4e9;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-field:focus {
            border-color: #ff8fab;
        }
        .btn-add {
            background: #ff8fab;
            color: white;
            padding: 12px 25px;
            border-radius: 15px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-add:hover {
            background: #ff4d7d;
            transform: scale(1.02);
        }

        @media (min-width: 768px) {
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th {
                background: linear-gradient(90deg, #ff8fab, #ffb6c1);
                color: white;
                padding: 18px;
                font-size: 1.1rem;
            }
            td {
                padding: 15px;
                border-bottom: 1px solid #ffe4e9;
                text-align: center;
                color: #4a5568;
            }
            .mobile-label { display: none; }
        }

        @media (max-width: 767px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr {
                margin-bottom: 15px;
                border-bottom: 2px solid #ffe4e9;
                padding: 15px 10px;
                background: white;
            }
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                text-align: right;
                padding: 8px 0;
                border: none;
            }
            .mobile-label {
                font-weight: 700;
                color: #ff8fab;
                flex-shrink: 0;
                margin-left: 10px;
            }
            .editable-note {
                min-width: 65% !important;
                text-align: right;
            }
        }
        
        .editable-note {
            display: inline-block;
            min-width: 120px;
            padding: 8px 12px;
            border-radius: 12px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: text;
            background: #fdf2f8;
            color: #be185d;
            font-weight: 500;
            outline: none;
            font-size: 0.95rem;
        }
        .editable-note:focus {
            border-color: #ff8fab;
            background: white;
        }

        .done-btn, .delete-btn {
            cursor: pointer;
            font-size: 1.4rem;
            transition: transform 0.2s;
            padding: 0 5px;
        }
        .delete-btn:hover { color: #e53e3e; transform: scale(1.2); }
        .done-btn:hover { transform: scale(1.2); }

        .completed-row {
            background-color: #f9fafb !important;
        }
        .completed-row td, .completed-row .mobile-label {
            color: #cbd5e0 !important;
            opacity: 0.7;
        }
        .completed-row .editable-note {
            text-decoration: line-through;
            background: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .code-tag {
            background: #fdf2f8;
            color: #be185d;
            padding: 3px 10px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            border: 1px dashed #f9a8d4;
            font-size: 0.9rem;
        }
        
        .btn-reset {
            background: white;
            color: #718096;
            padding: 10px 20px;
            border-radius: 50px;
            font-size: 0.8rem;
            transition: all 0.3s;
            border: 1px solid #e2e8f0;
        }
        .btn-reset:hover {
            color: #ff8fab;
            border-color: #ff8fab;
        }
    </style>
</head>
<body>

    <div class="text-center mb-8 px-4">
        <h1 class="text-3xl md:text-4xl font-bold text-[#ff8fab] mb-3">🌸 لوحة التحكم الشخصية 🌸</h1>
        <p class="text-gray-500 text-sm md:text-base italic">اللهم ارزقني رزقًا طيبًا مباركًا فيه🤍</p>
        <div class="h-1 w-20 bg-[#ff8fab] mx-auto mt-2 rounded-full opacity-50"></div>
    </div>

    <div class="main-container">
        <!-- نموذج إضافة براند -->
        <div class="glass-card p-6 mb-6">
            <h2 class="text-lg font-bold text-gray-700 mb-4">✨ إضافة براند جديد</h2>
            <div class="add-form">
                <input type="text" id="newBrand" class="input-field" placeholder="اسم البراند...">
                <input type="text" id="newCode" class="input-field" placeholder="الكود...">
                <button onclick="addNewTask()" class="btn-add">إضافة +</button>
            </div>
        </div>

        <!-- الجدول -->
        <div class="glass-card">
            <table id="taskTable">
                <thead>
                    <tr>
                        <th style="width: 25%;">البراند</th>
                        <th style="width: 20%;">الكود</th>
                        <th style="width: 45%;">الملاحظات</th>
                        <th style="width: 10%;">إجراء</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- البيانات هنا -->
                </tbody>
            </table>
        </div>

        <div class="mt-8 flex flex-col items-center gap-4">
            <button onclick="resetAllNotes()" class="btn-reset">تصفير الملاحظات (للقائمة الحالية)</button>
        </div>
    </div>

    <p class="my-8 text-gray-400 text-xs text-center italic">
        جميع البيانات تُحفظ في متصفحك بشكل آمن ✨
    </p>

    <script>
        const initialTasks = [
            { brand: "شيك بوينت", code: "HL24" },
            { brand: "زيت محاسن", code: "HL55" },
            { brand: "شايا", code: "HLA" },
            { brand: "بيتونيا", code: "AA48" },
            { brand: "نايس ون", code: "ZL797" },
            { brand: "شي ان", code: "-" },
            { brand: "شنط ميكب", code: "-" },
            { brand: "الاضاءه", code: "-" },
            { brand: "ماتشا", code: "-" },
            { brand: "مفرش السرير", code: "-" }
        ];

        function getSavedData() {
            const saved = localStorage.getItem('brandTasksDataV2');
            return saved ? JSON.parse(saved) : initialTasks.map(t => ({...t, note: "", completed: false, id: Date.now() + Math.random()}));
        }

        function saveData(data) {
            localStorage.setItem('brandTasksDataV2', JSON.stringify(data));
        }

        function render() {
            const data = getSavedData();
            const tbody = document.querySelector("#taskTable tbody");
            tbody.innerHTML = '';

            data.forEach((task, index) => {
                const tr = document.createElement('tr');
                if (task.completed) tr.classList.add('completed-row');

                tr.innerHTML = `
                    <td><span class="mobile-label">البراند:</span><span class="font-bold">${task.brand}</span></td>
                    <td><span class="mobile-label">الكود:</span><span class="code-tag">${task.code}</span></td>
                    <td>
                        <span class="mobile-label">الملاحظة:</span>
                        <div class="flex items-center">
                            <span class="done-btn" onclick="toggleComplete(${index})">
                                ${task.completed ? '✅' : '⭕'}
                            </span>
                            <div 
                                class="editable-note" 
                                contenteditable="${!task.completed}" 
                                onblur="updateNote(${index}, this.innerText)">
                                ${task.note || ''}
                            </div>
                        </div>
                    </td>
                    <td>
                        <span class="mobile-label">حذف:</span>
                        <span class="delete-btn" onclick="deleteTask(${index})">🗑️</span>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function addNewTask() {
            const brandInput = document.getElementById('newBrand');
            const codeInput = document.getElementById('newCode');
            
            if (brandInput.value.trim() === "") {
                alert("يرجى إدخال اسم البراند");
                return;
            }

            const data = getSavedData();
            data.unshift({
                id: Date.now(),
                brand: brandInput.value.trim(),
                code: codeInput.value.trim() || "-",
                note: "",
                completed: false
            });

            saveData(data);
            brandInput.value = "";
            codeInput.value = "";
            render();
        }

        function deleteTask(index) {
            if(confirm("هل أنتِ متأكدة من حذف هذا البراند نهائياً؟")) {
                const data = getSavedData();
                data.splice(index, 1);
                saveData(data);
                render();
            }
        }

        function updateNote(index, text) {
            const data = getSavedData();
            data[index].note = text.trim();
            saveData(data);
        }

        function toggleComplete(index) {
            const data = getSavedData();
            data[index].completed = !data[index].completed;
            saveData(data);
            render();
        }

        function resetAllNotes() {
            if(confirm("سيتم مسح ملاحظات البراندات الموجودة حالياً فقط وتصفير علامات الإتمام. هل أنتِ متأكدة؟")) {
                const data = getSavedData();
                const resetData = data.map(task => ({
                    ...task,
                    note: "",
                    completed: false
                }));
                saveData(resetData);
                render();
            }
        }

        render();
    </script>
</body>
</html>
