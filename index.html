<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إنجاز المهام  🎀</title>
    
    <!-- إعدادات الأيقونة للشاشة الرئيسية في الآيفون (Add to Home Screen) -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="برانداتي">
    
    <!-- المسار الصحيح بناءً على هيكلة المجلدات لديكِ -->
    <link rel="apple-touch-icon" href="icon.png/HLAA.png?v=5">
    <link rel="apple-touch-icon" sizes="152x152" href="icon.png/HLAA.png?v=5">
    <link rel="apple-touch-icon" sizes="180x180" href="icon.png/HLAA.png?v=5">
    <link rel="apple-touch-icon" sizes="167x167" href="icon.png/HLAA.png?v=5">
    
    <link rel="icon" href="icon.png/HLAA.png?v=5" type="image/png">

    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    
    <style>
        body {
            
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #f0e6ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }
        
        .main-container {
            width: 100%;
            max-width: 900px;
            animation: fadeIn 1s ease-out;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.8);
            overflow: hidden;
            margin-bottom: 20px;
               position: relative;
}

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .add-form {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
            flex-wrap: wrap;
        }
        .input-field {
            flex: 1;
            min-width: 120px;
            padding: 12px 20px;
            border-radius: 15px;
            border: 2px solid #ffe4e9;
            outline: none;
            transition: border-color 0.3s;
        }
        .input-field:focus {
            border-color: #ff8fab;
        }
        .btn-add {
            background: #ff8fab;
            color: white;
            padding: 12px 25px;
            border-radius: 15px;
            font-weight: bold;
            transition: all 0.3s;
        }
        .btn-add:hover {
            background: #ff4d7d;
            transform: scale(1.02);
        }

        @media (min-width: 768px) {
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th {
                background: linear-gradient(90deg, #ff8fab, #ffb6c1);
                color: white;
                padding: 18px;
                font-size: 1.1rem;
            }
            td {
                padding: 15px;
                border-bottom: 1px solid #ffe4e9;
                text-align: center;
                color: #4a5568;
            }
            .mobile-label { display: none; }
        }

        @media (max-width: 767px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr {
                margin-bottom: 15px;
                border-bottom: 2px solid #ffe4e9;
                padding: 15px 10px;
                background: white;
                border-radius: 20px;
            }
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                text-align: right;
                padding: 8px 0;
                border: none;
            }
            .mobile-label {
                font-weight: 700;
                color: #ff8fab;
                flex-shrink: 0;
                margin-left: 10px;
            }
        }
        
        .editable-note {
            display: inline-block;
            min-width: 120px;
            padding: 8px 12px;
            border-radius: 12px;
            background: #fdf2f8;
            color: #be185d;
            font-weight: 500;
            outline: none;
        }

        .completed-row {
            background-color: #f9fafb !important;
            opacity: 0.6;
        }
        
        .code-tag {
            background: #fdf2f8;
            color: #be185d;
            padding: 3px 10px;
            border-radius: 8px;
            font-family: monospace;
            font-weight: bold;
        }

        .action-link {
            font-size: 0.75rem;
            color: #94a3b8;
            text-decoration: underline;
            cursor: pointer;
            display: block;
            margin-top: 4px;
        }
        .action-link:hover {
            color: #ff8fab;
        }

        /* نافذة التأكيد المخصصة */
        #customConfirm {
            display: none;
            position: fixed;
            top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }
        
.menu-btn {
  position: absolute; /* 👈 بدل fixed */
  top: 10px;
  right: 10px;

  font-size: 26px;
  background: #ff8fab;
  color: white;

  width: 45px;
  height: 45px;

  border-radius: 10px;

  display: flex;
  align-items: center;
  justify-content: center;

  cursor: pointer;

  z-index: 9999;
}

.side-menu {
  position: fixed;
   top: 60px; /* 👈 ينزلها تحت الزر */
  right: -220px;
  width: 200px;
  height: 100%;

  background: white;
  box-shadow: -5px 0 15px rgba(0,0,0,0.1);

  padding-top: 60px;
  transition: 0.3s;

  z-index: 99999;
}

.side-menu a {
  display: flex;
  align-items: center;
  justify-content: flex-end;

  gap: 10px;

  margin: 10px;
  padding: 12px 15px;

  background: #fff0f5;
  border-radius: 12px;

border: 1px solid #ffe4ec;
    
  text-decoration: none;
  color: #d81b60;
  font-weight: bold;

  box-shadow: 0 5px 12px rgba(0,0,0,0.08);

  transition: 0.3s;
}

    .side-menu.open {
  right: 0;
}

.side-menu a:hover {
  transform: scale(1.05);
  background: #ffe4ec;
}

.alert {
  position: fixed;
  top: 70px;
  right: 15px;

  background: #ffffff;
  color: #d81b60;

  padding: 12px 16px;
  border-radius: 14px;

  font-size: 14px;
  font-weight: bold;

  box-shadow: 0 10px 25px rgba(0,0,0,0.15);

  border: 1px solid #ffe4e9;

  display: flex;
  align-items: center;
  gap: 8px;

  opacity: 0;
  transform: translateY(-10px);
  transition: 0.4s;

  z-index: 9999;
}

.alert.show {
  opacity: 1;
  transform: translateY(0);
}
        
    </style>
</head>
<body>

<!-- زر القائمة (فوق الصفحة) -->
<div class="menu-btn" onclick="toggleMenu()">☰</div>

<!-- القائمة -->
<div id="sideMenu" class="side-menu">
  <a href="routine.html">💅🏻 الروتين الشهري</a>
    <a href="info.html">📦 معلوماتي</a>
</div>

<!-- التنبيه -->
<div id="dailyAlert" class="alert">
  🔔 لا تنسين روتين اليوم
</div>

<!-- نافذة تأكيد الحذف -->
<div id="customConfirm">
  <div class="bg-white p-6 rounded-3xl shadow-xl max-w-xs w-full text-center mx-4">
    <p class="text-lg font-bold text-gray-700 mb-4">
      هل أنتِ متأكدة من حذف هذا البراند؟ 🎀
    </p>
    <div class="flex gap-3 justify-center">
      <button id="confirmBtn" class="bg-red-400 text-white px-6 py-2 rounded-xl font-bold">
        حذف
      </button>
      <button onclick="closeConfirm()" class="bg-gray-200 text-gray-600 px-6 py-2 rounded-xl font-bold">
        إلغاء
      </button>
    </div>
  </div>
</div>

<!-- العنوان -->
<div class="text-center mb-8 px-4">
  <h1 class="text-3xl md:text-4xl font-bold text-[#ff8fab] mb-3">
    🎀 لوحة المهام الشخصية 🎀
  </h1>
  <p class="text-gray-500 text-sm md:text-base italic">
    اللهم ارزقني رزقًا طيبًا مباركًا فيه🤍
  </p>
</div>

<div class="main-container">

  <!-- كرت إضافة براند -->
  <div class="glass-card p-6 mb-6">

    <h2 class="text-lg font-bold text-gray-700 mb-4">
      ✨ إضافة براند جديد
    </h2>

    <div class="add-form">
      <input type="text" id="newBrand" class="input-field" placeholder="اسم البراند...">
      <input type="text" id="newCode" class="input-field" placeholder="الكود...">
      <button onclick="addNewTask()" class="btn-add">إضافة +</button>
    </div>

  </div>

  <!-- كرت الجدول (خله منفصل) -->
  <div class="glass-card">
    <table id="taskTable">
      <thead>
        <tr>
          <th style="width: 25%;">البراند</th>
          <th style="width: 20%;">الكود</th>
          <th style="width: 45%;">الملاحظات</th>
          <th style="width: 10%;">إجراء</th>
        </tr>
      </thead>
      <tbody></tbody>
    </table>
  </div>

</div>

    <script>
        const initialTasks = [
            { brand: "شيك بوينت", code: "HL24" },
            { brand: "زيت محاسن", code: "HL55" },
            { brand: "شايا", code: "HLA" },
            { brand: "بيتونيا", code: "AA48" },
            { brand: "نايس ون", code: "ZL797" },
            { brand: "شي ان", code: "-" },
            { brand: "شنط ميكب", code: "-" },
            { brand: "الإضاءة", code: "-" },
        { brand: "ماتشا", code: "-" },
        { brand: "مفرش السرير", code: "-" },
        ];

        let deleteIndex = null;

        function getSavedData() {
            const saved = localStorage.getItem('brandTasksDataV2');
            return saved ? JSON.parse(saved) : initialTasks.map(t => ({...t, note: "", completed: false, id: Date.now() + Math.random()}));
        }

        function saveData(data) {
            localStorage.setItem('brandTasksDataV2', JSON.stringify(data));
        }

        function render() {
            const data = getSavedData();
            const tbody = document.querySelector("#taskTable tbody");
            tbody.innerHTML = '';

            data.forEach((task, index) => {
                const tr = document.createElement('tr');
                if (task.completed) tr.classList.add('completed-row');

                tr.innerHTML = `
                    <td><span class="mobile-label">البراند:</span><b>${task.brand}</b></td>
                    <td><span class="mobile-label">الكود:</span><span class="code-tag">${task.code}</span></td>
                    <td>
                        <span class="mobile-label">الملاحظة:</span>
                        <div class="flex items-center gap-2 justify-center md:justify-start">
                             <span onclick="toggleComplete(${index})" class="cursor-pointer text-xl">${task.completed ? '✅' : '⭕'}</span>
                             <div class="editable-note" contenteditable="${!task.completed}" onblur="updateNote(${index}, this.innerText)">${task.note || ''}</div>
                        </div>
                    </td>
                    <td>
                        <span class="mobile-label">إجراء:</span>
                        <div class="flex flex-col items-center">
                            <span class="cursor-pointer text-xl" onclick="showConfirm(${index})">🗑️</span>
                            <span class="action-link" onclick="resetTask(${index})">إعادة تعيين</span>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function addNewTask() {
            const brand = document.getElementById('newBrand').value;
            const code = document.getElementById('newCode').value;
            if (!brand) return;
            const data = getSavedData();
            data.unshift({ brand, code: code || "-", note: "", completed: false, id: Date.now() });
            saveData(data);
            document.getElementById('newBrand').value = '';
            document.getElementById('newCode').value = '';
            render();
        }

        function updateNote(index, text) {
            const data = getSavedData();
            data[index].note = text;
            saveData(data);
        }

        function toggleComplete(index) {
            const data = getSavedData();
            data[index].completed = !data[index].completed;
            saveData(data);
            render();
        }

        function resetTask(index) {
            const data = getSavedData();
            data[index].completed = false;
            data[index].note = "";
            saveData(data);
            render();
        }

        function showConfirm(index) {
            deleteIndex = index;
            document.getElementById('customConfirm').style.display = 'flex';
        }

        function closeConfirm() {
            document.getElementById('customConfirm').style.display = 'none';
            deleteIndex = null;
        }

        document.getElementById('confirmBtn').onclick = function() {
            if (deleteIndex !== null) {
                const data = getSavedData();
                data.splice(deleteIndex, 1);
                saveData(data);
                render();
                closeConfirm();
            }
        };

        function deleteTask(index) {
            const data = getSavedData();
            data.splice(index, 1);
            saveData(data);
            render();
        }

        render();




function toggleMenu() {
  let menu = document.getElementById("sideMenu");
  menu.classList.toggle("open");
}



  let alertBox = document.getElementById("dailyAlert");

alertBox.classList.add("show");

setTimeout(() => {
  alertBox.classList.remove("show");
}, 5000);

 


        
    </script>
</body>
</html>
