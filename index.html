<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إنجاز المهام الذكية ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
    
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #f0e6ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 40px 20px;
        }
        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 30px;
            box-shadow: 0 20px 50px rgba(255, 182, 193, 0.4);
            border: 2px solid rgba(255, 255, 255, 0.8);
            width: 100%;
            max-width: 900px;
            overflow: hidden;
            animation: fadeIn 1s ease-out;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }
        table {
            width: 100%;
            border-collapse: collapse;
        }
        th {
            background: linear-gradient(90deg, #ff8fab, #ffb6c1);
            color: white;
            padding: 20px;
            font-size: 1.2rem;
            text-shadow: 1px 1px 2px rgba(0,0,0,0.1);
        }
        td {
            padding: 18px 15px;
            border-bottom: 1px solid #ffe4e9;
            text-align: center;
            color: #4a5568;
            font-size: 1rem;
        }
        tr:hover td {
            background-color: #fff9fa;
        }
        
        /* تصميم خانة الملاحظات القابلة للتعديل */
        .editable-note {
            display: inline-block;
            min-width: 150px;
            padding: 8px 15px;
            border-radius: 15px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: text;
            background: #fdf2f8;
            color: #be185d;
            font-weight: 500;
            outline: none;
        }
        .editable-note:focus {
            border-color: #ff8fab;
            background: white;
            box-shadow: 0 0 10px rgba(255, 143, 171, 0.2);
        }
        .editable-note:empty::before {
            content: "اكتبي ملاحظة...";
            color: #cbd5e0;
        }

        /* زر الإتمام بجانب الملاحظة */
        .done-btn {
            cursor: pointer;
            margin-right: 10px;
            font-size: 1.2rem;
            transition: transform 0.2s;
            display: inline-flex;
            align-items: center;
        }
        .done-btn:hover { transform: scale(1.2); }

        .completed-row td {
            color: #a0aec0 !important;
            opacity: 0.6;
        }
        .completed-row .editable-note {
            text-decoration: line-through;
            background: #edf2f7;
            color: #718096;
            cursor: not-allowed;
        }

        .code-tag {
            background: #fdf2f8;
            color: #be185d;
            padding: 4px 10px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            border: 1px dashed #f9a8d4;
        }
        .footer-note {
            margin-top: 30px;
            color: #a0aec0;
            font-size: 0.9rem;
            text-align: center;
        }
        .btn-action {
            background: white;
            color: #ff8fab;
            padding: 10px 25px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 143, 171, 0.2);
            transition: all 0.3s;
            border: 1px solid #ffe4e9;
        }
        .btn-action:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 20px rgba(255, 143, 171, 0.3);
            background: #ff8fab;
            color: white;
        }
    </style>
</head>
<body>

    <div class="text-center mb-10">
        <h1 class="text-4xl font-bold text-[#ff8fab] mb-3">🌸 لوحة التحكم الشخصية 🌸</h1>
        <p class="text-gray-500 italic">اضغطي على النص لتعديله، وعلى الرمز لإتمام المهمة</p>
        <div class="h-1 w-24 bg-[#ff8fab] mx-auto mt-4 rounded-full"></div>
    </div>

    <div class="glass-card">
        <table id="taskTable">
            <thead>
                <tr>
                    <th style="width: 8%;">#</th>
                    <th style="width: 22%;">البراند</th>
                    <th style="width: 15%;">الاكواد</th>
                    <th style="width: 55%;">الملاحظات</th>
                </tr>
            </thead>
            <tbody>
                <!-- Rows injected by JS -->
            </tbody>
        </table>
    </div>

    <div class="mt-8 flex gap-4">
        <button onclick="resetAll()" class="btn-action">إعادة تعيين الجدول بالكامل</button>
    </div>

    <p class="footer-note">
        جميع التعديلات تُحفظ تلقائياً في متصفحك ✨
    </p>

    <script>
        const initialTasks = [
            { id: 1, brand: "شيك بوينت", code: "HL24", note: "موجود ومطلوب تصويره" },
            { id: 2, brand: "زيت محاسن", code: "HL55", note: "-" },
            { id: 3, brand: "شايا", code: "HLA", note: "موجود ومطلوب تصويره" },
            { id: 4, brand: "بيتونيا", code: "AA48", note: "شحنة منتظرة" },
            { id: 5, brand: "نايس ون", code: "ZL797", note: "شحنة منتظرة / تصوير" },
            { id: 6, brand: "شي ان", code: "-", note: "شحنة منتظرة" },
            { id: 7, brand: "شنط ميكب", code: "-", note: "شحنة منتظرة" },
            { id: 8, brand: "الاضاءه", code: "-", note: "شحنة منتظرة" },
            { id: 9, brand: "ماتشا", code: "-", note: "شحنة منتظرة" },
            { id: 10, brand: "مفرش السرير", code: "-", note: "موجود ومطلوب تصويره" }
        ];

        function getSavedData() {
            const saved = localStorage.getItem('brandTasksData');
            return saved ? JSON.parse(saved) : initialTasks.map(t => ({...t, completed: false}));
        }

        function saveData(data) {
            localStorage.setItem('brandTasksData', JSON.stringify(data));
        }

        function render() {
            const data = getSavedData();
            const tbody = document.querySelector("#taskTable tbody");
            tbody.innerHTML = '';

            data.forEach((task, index) => {
                const tr = document.createElement('tr');
                if (task.completed) tr.classList.add('completed-row');

                tr.innerHTML = `
                    <td>${task.id}</td>
                    <td class="font-bold">${task.brand}</td>
                    <td><span class="code-tag">${task.code}</span></td>
                    <td class="flex items-center justify-center">
                        <span class="done-btn" onclick="toggleComplete(${index})">
                            ${task.completed ? '✅' : '⭕'}
                        </span>
                        <div 
                            class="editable-note" 
                            contenteditable="${!task.completed}" 
                            oninput="updateNote(${index}, this.innerText)">
                            ${task.note}
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateNote(index, text) {
            const data = getSavedData();
            data[index].note = text;
            saveData(data);
        }

        function toggleComplete(index) {
            const data = getSavedData();
            data[index].completed = !data[index].completed;
            saveData(data);
            render();
        }

        function resetAll() {
            if(confirm("سيتم مسح كل التعديلات والملاحظات والعودة للوضع الأصلي. هل أنتِ متأكدة؟")) {
                localStorage.removeItem('brandTasksData');
                render();
            }
        }

        // Initial render
        render();
    </script>
</body>
</html>
