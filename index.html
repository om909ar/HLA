<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة إنجاز المهام الذكية ✨</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;500;700&display=swap" rel="stylesheet">
    <link rel="icon" href="data:image/svg+xml,<svg xmlns=%22http://www.w3.org/2000/svg%22 viewBox=%220 0 100 100%22><text y=%22.9em%22 font-size=%2290%22>🌸</text></svg>">
    
    <style>
        body {
            font-family: 'Tajawal', sans-serif;
            background: linear-gradient(135deg, #fff5f7 0%, #f0e6ff 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 20px 10px;
        }
        
        .main-container {
            width: 100%;
            max-width: 900px;
            animation: fadeIn 1s ease-out;
        }

        .glass-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(15px);
            border-radius: 25px;
            box-shadow: 0 15px 35px rgba(255, 182, 193, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.8);
            overflow: hidden;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (min-width: 768px) {
            table {
                width: 100%;
                border-collapse: collapse;
            }
            th {
                background: linear-gradient(90deg, #ff8fab, #ffb6c1);
                color: white;
                padding: 18px;
                font-size: 1.1rem;
            }
            td {
                padding: 15px;
                border-bottom: 1px solid #ffe4e9;
                text-align: center;
                color: #4a5568;
            }
            .mobile-label { display: none; }
        }

        @media (max-width: 767px) {
            table, thead, tbody, th, td, tr { display: block; }
            thead { display: none; }
            tr {
                margin-bottom: 15px;
                border-bottom: 2px solid #ffe4e9;
                padding: 15px 10px;
                background: white;
            }
            td {
                display: flex;
                justify-content: space-between;
                align-items: center;
                text-align: right;
                padding: 8px 0;
                border: none;
            }
            .mobile-label {
                font-weight: 700;
                color: #ff8fab;
                flex-shrink: 0;
                margin-left: 10px;
            }
            .editable-note {
                min-width: 65% !important;
                text-align: right;
            }
        }
        
        .editable-note {
            display: inline-block;
            min-width: 150px;
            padding: 8px 12px;
            border-radius: 12px;
            border: 2px solid transparent;
            transition: all 0.3s ease;
            cursor: text;
            background: #fdf2f8;
            color: #be185d;
            font-weight: 500;
            outline: none;
            font-size: 0.95rem;
        }
        .editable-note:focus {
            border-color: #ff8fab;
            background: white;
            box-shadow: 0 0 10px rgba(255, 143, 171, 0.2);
        }

        .done-btn {
            cursor: pointer;
            font-size: 1.4rem;
            transition: transform 0.2s;
            margin-left: 8px;
        }

        .completed-row {
            background-color: #f9fafb !important;
        }
        .completed-row td, .completed-row .mobile-label {
            color: #cbd5e0 !important;
            opacity: 0.7;
        }
        .completed-row .editable-note {
            text-decoration: line-through;
            background: #f1f5f9;
            color: #94a3b8;
            cursor: not-allowed;
        }

        .code-tag {
            background: #fdf2f8;
            color: #be185d;
            padding: 3px 10px;
            border-radius: 8px;
            font-family: 'Courier New', Courier, monospace;
            font-weight: bold;
            border: 1px dashed #f9a8d4;
            font-size: 0.9rem;
        }
        
        .btn-action {
            background: white;
            color: #ff8fab;
            padding: 12px 30px;
            border-radius: 50px;
            font-weight: 600;
            box-shadow: 0 4px 15px rgba(255, 143, 171, 0.2);
            transition: all 0.3s;
            border: 1px solid #ffe4e9;
            width: 100%;
            max-width: 350px;
        }
        .btn-action:hover {
            background: #ff4d7d;
            color: white;
            border-color: #ff4d7d;
        }
    </style>
</head>
<body>

    <div class="text-center mb-10 px-4">
        <h1 class="text-3xl md:text-4xl font-bold text-[#ff8fab] mb-3">🌸 لوحة التحكم الشخصية 🌸</h1>
        <div class="h-1 w-20 bg-[#ff8fab] mx-auto mt-2 rounded-full opacity-50"></div>
    </div>

    <div class="main-container">
        <div class="glass-card">
            <table id="taskTable">
                <thead>
                    <tr>
                        <th style="width: 30%;">البراند</th>
                        <th style="width: 20%;">الكود</th>
                        <th style="width: 50%;">الملاحظات</th>
                    </tr>
                </thead>
                <tbody>
                    <!-- Rows injected by JS -->
                </tbody>
            </table>
        </div>

        <div class="mt-8 flex justify-center px-4">
            <button onclick="resetAll()" class="btn-action text-sm md:text-base">إعادة تعيين الجدول (مسح الملاحظات)</button>
        </div>
    </div>

    <p class="mt-8 text-gray-400 text-xs md:text-sm text-center">
        جميع التعديلات تُحفظ تلقائياً في متصفحك ✨
    </p>

    <script>
        const initialTasks = [
            { id: 1, brand: "شيك بوينت", code: "HL24" },
            { id: 2, brand: "زيت محاسن", code: "HL55" },
            { id: 3, brand: "شايا", code: "HLA" },
            { id: 4, brand: "بيتونيا", code: "AA48" },
            { id: 5, brand: "نايس ون", code: "ZL797" },
            { id: 6, brand: "شي ان", code: "-" },
            { id: 7, brand: "شنط ميكب", code: "-" },
            { id: 8, brand: "الاضاءه", code: "-" },
            { id: 9, brand: "ماتشا", code: "-" },
            { id: 10, brand: "مفرش السرير", code: "-" }
        ];

        function getSavedData() {
            const saved = localStorage.getItem('brandTasksData');
            return saved ? JSON.parse(saved) : initialTasks.map(t => ({...t, note: "", completed: false}));
        }

        function saveData(data) {
            localStorage.setItem('brandTasksData', JSON.stringify(data));
        }

        function render() {
            const data = getSavedData();
            const tbody = document.querySelector("#taskTable tbody");
            tbody.innerHTML = '';

            data.forEach((task, index) => {
                const tr = document.createElement('tr');
                if (task.completed) tr.classList.add('completed-row');

                tr.innerHTML = `
                    <td><span class="mobile-label">البراند:</span><span class="font-bold">${task.brand}</span></td>
                    <td><span class="mobile-label">الكود:</span><span class="code-tag">${task.code}</span></td>
                    <td>
                        <span class="mobile-label">الملاحظة:</span>
                        <div class="flex items-center">
                            <span class="done-btn" onclick="toggleComplete(${index})">
                                ${task.completed ? '✅' : '⭕'}
                            </span>
                            <div 
                                class="editable-note" 
                                contenteditable="${!task.completed}" 
                                onblur="updateNote(${index}, this.innerText)">
                                ${task.note || ''}
                            </div>
                        </div>
                    </td>
                `;
                tbody.appendChild(tr);
            });
        }

        function updateNote(index, text) {
            const data = getSavedData();
            data[index].note = text.trim();
            saveData(data);
        }

        function toggleComplete(index) {
            const data = getSavedData();
            data[index].completed = !data[index].completed;
            saveData(data);
            render();
        }

        function resetAll() {
            if(confirm("سيتم مسح كافة الملاحظات وعلامات الإتمام. هل أنتِ متأكدة؟")) {
                const cleanData = initialTasks.map(t => ({...t, note: "", completed: false}));
                saveData(cleanData);
                render();
            }
        }

        render();
    </script>
</body>
</html>
